# Minimale Deployment-Konfiguration im Portfolio
# Quelle: chapters/15_bewerbungsprozess.tex (Zeile 273)
# docker-compose.yml -- Zeigt Infrastruktur-Denken
version: "3.8"
services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    depends_on:
      - redis
      - qdrant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["./qdrant_storage:/storage"]

